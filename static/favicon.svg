<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo redondeado azul -->
  <rect width="100" height="100" rx="18" fill="#2b6cb0"/>

  <!-- Cuadrícula 3x3 de celdas blancas -->
  <!-- Fila 1 -->
  <rect x="8"  y="8"  width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="37" y="8"  width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="66" y="8"  width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <!-- Fila 2 -->
  <rect x="8"  y="37" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="37" y="37" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="66" y="37" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <!-- Fila 3 -->
  <rect x="8"  y="66" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="37" y="66" width="26" height="26" rx="4" fill="white" opacity="0.95"/>
  <rect x="66" y="66" width="26" height="26" rx="4" fill="white" opacity="0.95"/>

  <!-- Números en algunas celdas para que parezca un Sudoku jugado -->
  <text x="21" y="27"  text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#2b6cb0">5</text>
  <text x="50" y="27"  text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#2b6cb0">3</text>
  <!-- celda 3 vacía: da sensación de puzzle en curso -->
  <text x="21" y="56"  text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#2b6cb0">6</text>
  <!-- celda 5 vacía -->
  <text x="79" y="56"  text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#2b6cb0">8</text>
  <!-- celda 7 vacía -->
  <text x="50" y="85"  text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#2b6cb0">9</text>
  <text x="79" y="85"  text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="#2b6cb0">7</text>
</svg>
